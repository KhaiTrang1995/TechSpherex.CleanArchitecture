# ============================================================
# OpenTelemetry Collector Configuration
# Routes telemetry to ELK or Grafana stack depending on profile.
# ============================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

exporters:
  # Grafana Tempo (traces)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Grafana Loki (logs)
  loki:
    endpoint: http://loki:3100/loki/api/v1/push

  # Prometheus (metrics)
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: techspherex

  # Elasticsearch (logs — for ELK profile)
  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    logs_index: techspherex-otel-logs
    traces_index: techspherex-otel-traces

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki, debug]
