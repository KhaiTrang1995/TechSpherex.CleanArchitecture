# ============================================================
# Prometheus Configuration — TechSpherex
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: techspherex-dev
    namespace: clean-architecture

scrape_configs:
  # API Application Metrics
  - job_name: techspherex-api
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8080"]
        labels:
          service: techspherex-api
          environment: development

  # OpenTelemetry Collector Metrics
  - job_name: otel-collector
    scrape_interval: 10s
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector

  # PostgreSQL Metrics (if exporter is available)
  # - job_name: postgres
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # Redis Metrics (if exporter is available)
  # - job_name: redis
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

# Enable remote write for Tempo metrics
remote_write:
  - url: http://localhost:9090/api/v1/write
