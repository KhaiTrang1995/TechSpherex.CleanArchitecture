# ============================================================
# Logstash Pipeline — TechSpherex Clean Architecture
# Receives structured JSON logs from Serilog and forwards to Elasticsearch.
# ============================================================

input {
  # Serilog.Sinks.Http or TCP sink
  tcp {
    port => 31311
    codec => json_lines
  }

  # Beats input (Filebeat, etc.)
  beats {
    port => 5044
  }
}

filter {
  # Parse timestamp if present
  if [Timestamp] {
    date {
      match => ["Timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["Timestamp"]
    }
  }

  # Add service metadata
  mutate {
    add_field => { "service" => "techspherex-api" }
  }

  # Parse log level
  if [Level] {
    mutate {
      rename => { "Level" => "log_level" }
    }
  }

  # Extract trace correlation
  if [Properties][TraceId] {
    mutate {
      add_field => { "trace_id" => "%{[Properties][TraceId]}" }
      add_field => { "span_id" => "%{[Properties][SpanId]}" }
    }
  }

  # Extract tenant info if present
  if [Properties][TenantId] {
    mutate {
      add_field => { "tenant_id" => "%{[Properties][TenantId]}" }
    }
  }

  # Remove verbose fields for storage efficiency
  mutate {
    remove_field => ["host", "port", "@version"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "techspherex-logs-%{+YYYY.MM.dd}"
    action => "create"
  }

  # Debug output (comment out in production)
  # stdout { codec => rubydebug }
}
